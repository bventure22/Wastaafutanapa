<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UWAT – Umoja wa Wastaafu TANAPA</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #1a3a2a;
    --forest-mid: #2d5a3d;
    --forest-light: #3d7a52;
    --gold: #c9a227;
    --gold-light: #e8c050;
    --cream: #f5f0e8;
    --warm-white: #fdfaf4;
    --text-dark: #1a1a1a;
    --text-mid: #3a3a3a;
    --text-light: #666;
    --sand: #e8dfc8;
    --rust: #8b4513;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Nunito Sans', sans-serif;
    background: var(--warm-white);
    color: var(--text-dark);
    overflow-x: hidden;
  }

  /* ─── NAV ─── */
  nav {
    position: fixed; top:0; left:0; right:0; z-index:1000;
    background: rgba(26,58,42,0.97);
    backdrop-filter: blur(10px);
    border-bottom: 2px solid var(--gold);
    padding: 0 40px;
    display: flex; align-items: center; justify-content: space-between;
    height: 70px;
  }

  .nav-logo {
    display: flex; align-items: center; gap: 14px; text-decoration: none;
  }
  .nav-logo-icon {
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .nav-logo-text .name {
    font-family: 'Playfair Display', serif;
    font-size: 18px; font-weight: 700;
    color: var(--cream); letter-spacing: 1px;
  }
  .nav-logo-text .tagline {
    font-size: 10px; color: var(--gold-light);
    letter-spacing: 2px; text-transform: uppercase;
  }

  .nav-links { display: flex; gap: 6px; align-items: center; }
  .nav-links a {
    color: var(--cream); text-decoration: none;
    padding: 8px 16px; border-radius: 4px;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.5px; text-transform: uppercase;
    transition: all 0.2s;
    cursor: pointer;
  }
  .nav-links a:hover, .nav-links a.active {
    background: var(--gold); color: var(--forest);
  }

  .nav-cta {
    background: var(--gold) !important; color: var(--forest) !important;
    font-weight: 700 !important;
    border: none; border-radius: 4px;
  }

  /* ─── PAGES ─── */
  .page { display: none; }
  .page.active { display: block; }

  /* ─── HERO ─── */
  .hero {
    min-height: 100vh;
    background:
      linear-gradient(160deg, rgba(26,58,42,0.85) 0%, rgba(45,90,61,0.75) 50%, rgba(26,58,42,0.9) 100%),
      url('https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?w=1600&q=80') center/cover no-repeat;
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 120px 40px 80px;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content:'';
    position: absolute; inset:0;
    background: radial-gradient(ellipse at 50% 60%, rgba(201,162,39,0.15) 0%, transparent 70%);
  }
  .hero-badge {
    display: inline-block;
    background: rgba(201,162,39,0.2);
    border: 1px solid var(--gold);
    color: var(--gold-light); font-size: 11px;
    letter-spacing: 3px; text-transform: uppercase;
    padding: 8px 24px; border-radius: 100px;
    margin-bottom: 28px;
    animation: fadeUp 0.8s 0.2s both;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(48px, 7vw, 88px);
    font-weight: 900; line-height: 1;
    color: #fff; margin-bottom: 10px;
    animation: fadeUp 0.8s 0.4s both;
  }
  .hero h1 span { color: var(--gold); }
  .hero-subtitle {
    font-size: clamp(16px, 2.5vw, 24px);
    color: var(--cream); margin-bottom: 20px;
    font-family: 'Playfair Display', serif; font-style: italic;
    animation: fadeUp 0.8s 0.5s both;
  }
  .hero-desc {
    max-width: 680px; margin: 0 auto 40px;
    font-size: 16px; color: rgba(245,240,232,0.85);
    line-height: 1.8;
    animation: fadeUp 0.8s 0.6s both;
  }
  .hero-btns {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    animation: fadeUp 0.8s 0.7s both;
  }
  .btn-primary {
    background: var(--gold); color: var(--forest);
    padding: 16px 36px; border-radius: 4px;
    font-weight: 700; font-size: 14px;
    letter-spacing: 1px; text-transform: uppercase;
    border: none; cursor: pointer;
    transition: all 0.2s; text-decoration: none; display: inline-block;
  }
  .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }
  .btn-outline {
    background: transparent; color: var(--cream);
    padding: 16px 36px; border-radius: 4px;
    font-weight: 700; font-size: 14px;
    letter-spacing: 1px; text-transform: uppercase;
    border: 2px solid rgba(245,240,232,0.5); cursor: pointer;
    transition: all 0.2s; text-decoration: none; display: inline-block;
  }
  .btn-outline:hover { border-color: var(--cream); background: rgba(255,255,255,0.1); }

  .hero-stats {
    position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 60px;
    animation: fadeUp 0.8s 0.9s both;
  }
  .stat { text-align: center; }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 36px; font-weight: 900;
    color: var(--gold); line-height: 1;
  }
  .stat-label { font-size: 11px; color: rgba(245,240,232,0.7); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

  /* ─── SECTION COMMONS ─── */
  section { padding: 90px 40px; }
  .section-header { text-align: center; margin-bottom: 60px; }
  .section-kicker {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold); font-weight: 700; margin-bottom: 12px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 4vw, 52px); font-weight: 900;
    color: var(--forest); line-height: 1.1;
  }
  .section-line {
    width: 60px; height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    margin: 20px auto 0; border-radius: 2px;
  }
  .container { max-width: 1200px; margin: 0 auto; }

  /* ─── ABOUT SECTION (HOME) ─── */
  .about-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px;
    align-items: center; max-width: 1100px; margin: 0 auto;
  }
  .about-img-wrap {
    position: relative;
  }
  .about-img-wrap img {
    width: 100%; border-radius: 8px;
    aspect-ratio: 4/3; object-fit: cover;
    box-shadow: 30px 30px 0 var(--sand);
  }
  .about-badge {
    position: absolute; bottom: -20px; right: -20px;
    background: var(--gold); color: var(--forest);
    padding: 20px 24px; border-radius: 4px;
    font-family: 'Playfair Display', serif;
    font-size: 14px; font-weight: 700; text-align: center;
    box-shadow: 0 10px 30px rgba(201,162,39,0.4);
  }
  .about-badge span { display: block; font-size: 28px; font-weight: 900; }
  .about-text .section-kicker { text-align: left; }
  .about-text .section-title { text-align: left; }
  .about-text .section-line { margin: 20px 0 30px; }
  .about-text p { color: var(--text-mid); line-height: 1.9; margin-bottom: 16px; font-size: 15px; }
  .about-pillars {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 32px;
  }
  .pillar {
    background: var(--cream); border-radius: 6px;
    padding: 18px; border-left: 3px solid var(--gold);
  }
  .pillar-icon { font-size: 22px; margin-bottom: 8px; }
  .pillar-title { font-weight: 700; font-size: 13px; color: var(--forest); margin-bottom: 4px; }
  .pillar-desc { font-size: 12px; color: var(--text-light); line-height: 1.5; }

  /* ─── PROGRAMS (HOME) ─── */
  .programs-bg { background: var(--forest); }
  .programs-bg .section-title { color: var(--cream); }
  .programs-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;
    max-width: 1100px; margin: 0 auto;
  }
  .program-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(201,162,39,0.2);
    border-radius: 8px; padding: 36px 28px;
    transition: all 0.3s;
  }
  .program-card:hover {
    background: rgba(255,255,255,0.1);
    border-color: var(--gold);
    transform: translateY(-6px);
  }
  .program-icon { font-size: 40px; margin-bottom: 20px; }
  .program-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 700;
    color: var(--cream); margin-bottom: 14px;
  }
  .program-desc { font-size: 14px; color: rgba(245,240,232,0.7); line-height: 1.8; }
  .program-link {
    display: inline-block; margin-top: 20px;
    color: var(--gold); font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    cursor: pointer; transition: gap 0.2s;
  }
  .program-link:hover { color: var(--gold-light); }

  /* ─── KALENDA (HOME) ─── */
  .kalenda-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
    max-width: 1100px; margin: 0 auto;
  }
  .event-item {
    display: flex; gap: 20px; padding: 24px;
    background: var(--cream); border-radius: 8px;
    transition: all 0.2s;
    border: 1px solid transparent;
  }
  .event-item:hover { border-color: var(--gold); transform: translateX(4px); }
  .event-date-box {
    min-width: 64px; height: 64px;
    background: var(--forest); border-radius: 6px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .event-date-box .day {
    font-family: 'Playfair Display', serif;
    font-size: 24px; font-weight: 900; color: var(--gold); line-height: 1;
  }
  .event-date-box .month { font-size: 11px; color: var(--cream); letter-spacing: 1px; }
  .event-info { flex: 1; }
  .event-type { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); font-weight: 700; margin-bottom: 4px; }
  .event-title { font-weight: 700; color: var(--forest); font-size: 15px; margin-bottom: 6px; }
  .event-meta { font-size: 13px; color: var(--text-light); }

  /* ─── PAGE 1: HABARI ─── */
  .page-hero {
    padding-top: 140px; padding-bottom: 70px;
    background: linear-gradient(135deg, var(--forest) 0%, var(--forest-mid) 100%);
    text-align: center;
    position: relative; overflow: hidden;
  }
  .page-hero::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(circle at 70% 50%, rgba(201,162,39,0.12), transparent 60%);
  }
  .page-hero-kicker { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; font-weight: 700; }
  .page-hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(40px, 5vw, 68px); font-weight: 900;
    color: #fff; margin-bottom: 16px;
  }
  .page-hero-desc { color: rgba(245,240,232,0.8); font-size: 16px; max-width: 550px; margin: 0 auto; line-height: 1.7; }

  /* News Grid */
  .news-featured {
    display: grid; grid-template-columns: 2fr 1fr; gap: 32px;
    max-width: 1100px; margin: 0 auto 64px;
  }
  .news-card {
    background: #fff; border-radius: 8px; overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.07);
    transition: transform 0.2s, box-shadow 0.2s;
    border: 1px solid rgba(0,0,0,0.05);
  }
  .news-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.12); }
  .news-card img { width: 100%; height: 240px; object-fit: cover; }
  .news-card-body { padding: 28px; }
  .news-tag {
    display: inline-block; background: var(--forest); color: var(--gold);
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    padding: 4px 12px; border-radius: 100px; font-weight: 700;
    margin-bottom: 14px;
  }
  .news-card-body h3 {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 700; color: var(--forest);
    margin-bottom: 12px; line-height: 1.3;
  }
  .news-card-body p { color: var(--text-light); font-size: 14px; line-height: 1.7; margin-bottom: 18px; }
  .news-meta { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-light); }
  .news-meta-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text-light); }
  .news-card.small img { height: 160px; }

  .news-grid-3 {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px;
    max-width: 1100px; margin: 0 auto 70px;
  }

  /* Blog */
  .blog-section { background: var(--cream); }
  .blog-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px;
    max-width: 1100px; margin: 0 auto;
  }
  .blog-card {
    background: #fff; border-radius: 8px; overflow: hidden;
    transition: transform 0.2s;
  }
  .blog-card:hover { transform: translateY(-4px); }
  .blog-card-top {
    height: 180px; display: flex; align-items: center; justify-content: center;
    font-size: 56px; position: relative; overflow: hidden;
  }
  .blog-card-body { padding: 24px; }
  .blog-cat { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); font-weight: 700; margin-bottom: 10px; }
  .blog-card-body h4 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--forest); margin-bottom: 10px; line-height: 1.3; }
  .blog-card-body p { font-size: 13px; color: var(--text-light); line-height: 1.7; }
  .blog-date { font-size: 12px; color: var(--text-light); margin-top: 16px; }

  /* Video */
  .video-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;
    max-width: 1100px; margin: 0 auto;
  }
  .video-card {
    border-radius: 8px; overflow: hidden; cursor: pointer;
    position: relative; transition: transform 0.2s;
  }
  .video-card:hover { transform: scale(1.02); }
  .video-thumb {
    height: 200px; position: relative;
    display: flex; align-items: center; justify-content: center;
    background: var(--forest-mid);
  }
  .video-thumb img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
  .play-btn {
    width: 60px; height: 60px; border-radius: 50%;
    background: rgba(201,162,39,0.9);
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index:2;
    font-size: 22px; color: var(--forest);
    transition: transform 0.2s, background 0.2s;
  }
  .video-card:hover .play-btn { transform: scale(1.1); background: var(--gold); }
  .video-info { padding: 16px; background: var(--forest); }
  .video-title { color: var(--cream); font-weight: 600; font-size: 14px; margin-bottom: 6px; }
  .video-dur { font-size: 12px; color: rgba(245,240,232,0.6); }

  /* ─── PAGE 2: MAKTABA ─── */
  .maktaba-cats {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 50px; max-width: 1100px; margin-left: auto; margin-right: auto;
  }
  .cat-btn {
    padding: 10px 24px; border-radius: 100px;
    background: var(--cream); border: 1px solid var(--sand);
    color: var(--text-mid); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .cat-btn:hover, .cat-btn.active { background: var(--forest); color: var(--cream); border-color: var(--forest); }

  .docs-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;
    max-width: 1100px; margin: 0 auto 60px;
  }
  .doc-card {
    background: #fff; border-radius: 8px;
    border: 1px solid var(--sand);
    padding: 28px 24px;
    display: flex; flex-direction: column;
    transition: all 0.2s;
  }
  .doc-card:hover { border-color: var(--gold); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
  .doc-icon {
    width: 52px; height: 52px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; margin-bottom: 18px;
  }
  .doc-icon.pdf { background: rgba(220,50,50,0.1); }
  .doc-icon.word { background: rgba(30,100,220,0.1); }
  .doc-icon.excel { background: rgba(30,140,60,0.1); }
  .doc-type { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); font-weight: 700; margin-bottom: 6px; }
  .doc-title { font-weight: 700; color: var(--forest); font-size: 15px; margin-bottom: 8px; line-height: 1.4; }
  .doc-desc { font-size: 13px; color: var(--text-light); line-height: 1.6; flex: 1; }
  .doc-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--sand); }
  .doc-size { font-size: 12px; color: var(--text-light); }
  .doc-download {
    display: flex; align-items: center; gap: 6px;
    background: var(--forest); color: var(--cream);
    padding: 8px 16px; border-radius: 4px;
    font-size: 12px; font-weight: 600;
    border: none; cursor: pointer; transition: background 0.2s;
  }
  .doc-download:hover { background: var(--forest-light); }

  /* Ripoti highlight */
  .ripoti-section { background: var(--forest); padding: 90px 40px; }
  .ripoti-section .section-title { color: var(--cream); }
  .ripoti-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
    max-width: 1100px; margin: 0 auto;
  }
  .ripoti-card {
    background: rgba(255,255,255,0.06); border-radius: 8px;
    padding: 28px 20px; border: 1px solid rgba(201,162,39,0.2);
    text-align: center; transition: all 0.2s;
  }
  .ripoti-card:hover { border-color: var(--gold); background: rgba(255,255,255,0.1); }
  .ripoti-year {
    font-family: 'Playfair Display', serif;
    font-size: 36px; font-weight: 900; color: var(--gold); margin-bottom: 8px;
  }
  .ripoti-title { color: var(--cream); font-weight: 600; font-size: 14px; margin-bottom: 12px; }
  .ripoti-type { font-size: 11px; color: rgba(245,240,232,0.5); margin-bottom: 20px; letter-spacing: 1px; }
  .ripoti-dl {
    background: var(--gold); color: var(--forest);
    border: none; padding: 10px 20px; border-radius: 4px;
    font-weight: 700; font-size: 12px; cursor: pointer;
    width: 100%; transition: background 0.2s;
  }
  .ripoti-dl:hover { background: var(--gold-light); }

  /* ─── PAGE 3: ELIMU ─── */
  .elimu-hero-wrap {
    background:
      linear-gradient(135deg, rgba(26,58,42,0.92), rgba(45,90,61,0.88)),
      url('https://images.unsplash.com/photo-1547036967-23d11aacaee0?w=1400&q=80') center/cover;
    text-align: center; padding: 140px 40px 80px;
  }
  .manifesto {
    max-width: 800px; margin: 0 auto;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(201,162,39,0.3);
    border-radius: 12px; padding: 50px;
  }
  .manifesto-icon { font-size: 52px; margin-bottom: 20px; }
  .manifesto h2 {
    font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 900;
    color: var(--cream); margin-bottom: 20px;
  }
  .manifesto p { color: rgba(245,240,232,0.85); line-height: 1.9; font-size: 16px; margin-bottom: 14px; }
  .manifesto-quote {
    margin-top: 32px; padding: 24px 32px;
    border-left: 4px solid var(--gold);
    font-family: 'Playfair Display', serif; font-style: italic;
    font-size: 20px; color: var(--gold-light);
    background: rgba(201,162,39,0.08); border-radius: 0 8px 8px 0;
  }

  .makala-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 32px;
    max-width: 1100px; margin: 0 auto;
  }
  .makala-card {
    display: flex; gap: 24px;
    background: #fff; border-radius: 8px; padding: 28px;
    border: 1px solid var(--sand); transition: all 0.2s;
    align-items: flex-start;
  }
  .makala-card:hover { border-color: var(--forest); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
  .makala-icon {
    width: 56px; height: 56px; border-radius: 8px;
    background: var(--forest); display: flex; align-items: center; justify-content: center;
    font-size: 26px; flex-shrink: 0;
  }
  .makala-body .cat { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); font-weight: 700; margin-bottom: 6px; }
  .makala-body h4 { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 700; color: var(--forest); margin-bottom: 10px; }
  .makala-body p { font-size: 13px; color: var(--text-light); line-height: 1.7; }
  .read-more { display: inline-block; margin-top: 14px; color: var(--forest-light); font-size: 13px; font-weight: 70
